    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || 'maze';
    const lang = params.get('lang') === 'fr' ? 'fr' : 'en';
    const locale = pageData[lang];
    const competition = locale.competitions[type] || locale.competitions.maze;

    document.documentElement.lang = lang;
    document.title = `${competition.title} ${locale.rulesWord} | RoboCup Junior Canada`;
    document.getElementById('home-link').href = locale.home;
    document.getElementById('page-title').innerHTML = `${competition.title}<span>${locale.rulesWord}</span>`;
    document.getElementById('page-summary').textContent = competition.summary;
    document.getElementById('back-link').href = locale.backHref;
    document.getElementById('back-link').textContent = locale.back;
    document.getElementById('footer-text').textContent = locale.footer;
    document.getElementById('hero-image').alt = locale.heroAlt;

    document.getElementById('nav-links').innerHTML = locale.nav.map(([label, href]) => {
      const url = href.replace('{type}', type);
      const active = label.includes('League') || label.includes('Ligue') ? ' active' : '';
      return `<a class="nav-link${active}" href="${url}">${label}</a>`;
    }).join('');

    document.getElementById('content').innerHTML = competition.sections.map(section => `
      <section class="${section.light ? 'light-section' : ''}">
        <div class="container">
          <h2 class="section-title">${section.title}</h2>
          <div class="content-grid">
            ${section.panels.map(panel => `
              <div class="panel">
                <h3>${panel.title}</h3>
                ${panel.formula ? `<p class="formula">${panel.formula}</p>` : ''}
                ${(panel.paragraphs || []).map(paragraph => `<p>${paragraph}</p>`).join('')}
                ${panel.items ? `<ul>${panel.items.map(item => `<li>${item}</li>`).join('')}</ul>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `).join('');
