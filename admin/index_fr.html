<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion administrateur | RoboCup Junior Canada</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <a class="brand-link" href="../index_fr.html">
        <span class="logo-circle">R</span>
        <span>RoboCup <strong>Junior Canada</strong></span>
      </a>

      <div class="language-switch">
        <a href="index.html">English</a>
        <span>Français</span>
      </div>

      <div class="auth-copy">
        <p class="eyebrow">Accès sur invitation</p>
        <h1>Connexion administrateur</h1>
        <p>Utilisez l'adresse courriel et le mot de passe de votre invitation Supabase pour accéder aux outils de pointage.</p>
      </div>

      <form id="login-form" class="auth-form">
        <label>
          Courriel
          <input id="email" type="email" autocomplete="email" required />
        </label>
        <label>
          Mot de passe
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="primary-action">Se connecter</button>
        <p id="auth-message" class="form-message" role="status" aria-live="polite"></p>
      </form>

      <a class="secondary-action button-link full-width-action" href="../index_fr.html">Retour au site</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
